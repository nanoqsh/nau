<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello</title>
</head>

<body>
    <style>
        * {
            font-family: 'JetBrains Mono', monospace;
        }

        body {
            background-color: #1a1a2e;
            margin: 0;
            min-height: 100vh;
            font-size: 16px;
        }

        .button {
            background-color: #e94560;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            margin: 20px;
            padding: 10px 20px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .button:hover {
            background-color: #c73652;
        }

        .text {
            display: inline;
            color: #ffffff;
            border: none;
            margin: 20px;
            padding: 10px 20px;
        }

        .counter {
            opacity: 1;
            transition: opacity 0.5s ease-in;
        }

        .counter.hidden {
            opacity: 0;
        }
    </style>
    <script type="module">
        import init from './counter.js';
        await init();
    </script>
    <div id="root"></div>
</body>

</html>
